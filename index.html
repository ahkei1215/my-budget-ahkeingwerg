<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4月財富管理</title>
    <style>
        :root { --primary: #3498db; --danger: #e74c3c; --dark: #2c3e50; --success: #27ae60; }
        
        /* 確保寬度 100% 並優化移動端體驗 */
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #f0f2f5; 
            padding: 10px; 
            margin: 0; 
            width: 100%;
            overflow-x: hidden;
        }

        .header { 
            background: var(--dark); 
            color: white; 
            padding: 20px 15px; 
            border-radius: 12px; 
            margin-bottom: 12px; 
            text-align: center; 
            width: 100%;
        }

        .grid { 
            display: grid; 
            grid-template-columns: 1fr; /* 移動端預設一欄，寬度會自動 100% */
            gap: 12px; 
            width: 100%;
        }

        .card { 
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); 
            width: 100%;
        }

        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .balance { font-size: 22px; font-weight: bold; color: var(--success); }
        
        .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
        input { 
            flex: 1; 
            padding: 10px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 16px; /* 防止 iOS 輸入時自動放大 */
            width: 100%;
        }

        button.main-btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            width: 100%; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px;
            transition: background 0.3s;
        }
        button.main-btn:active { background: #2980b9; }

        /* 歷史紀錄區域 */
        .history-box { 
            margin-top: 12px; 
            background: #f9f9f9; 
            border-radius: 8px; 
            padding: 8px; 
            max-height: 150px; 
            overflow-y: auto; 
            border: 1px solid #eee;
        }
        .history-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 8px 4px; 
            border-bottom: 1px solid #eee; 
            font-size: 13px; 
        }
        .history-row:last-child { border-bottom: none; }
        .history-amt { color: var(--danger); font-weight: bold; margin: 0 10px; }
        .del-x { color: #ccc; cursor: pointer; font-weight: bold; font-size: 18px; padding: 0 8px; }

        /* 修改後的「同步中」彈窗 */
        #sync-status { 
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: rgba(0, 0, 0, 0.8); 
            color: white; 
            padding: 20px 40px; 
            border-radius: 50px; 
            z-index: 9999; 
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0">4月預算</h2>
    <div id="total-left" style="font-size:16px; margin-top:8px; font-weight:bold; color: #ecf0f1;">計算中...</div>
</div>

<div id="sync-status">☁️ 雲端同步中...</div>

<div class="grid" id="budget-container"></div>

<script>
// 請確保 API_URL 正確
const API_URL = 'https://script.google.com/macros/s/AKfycbzOV0Km_t68RnmCWD7YXSFt8l6I1PGHlB2plKFmu4APWcB0lR0yhBcegDlZ_YRzNtGn/exec'; 

const initialBudgets = {
    "午餐": 2640, "晚餐": 3120, "零用": 6690, "交通/養車": 4100,
    "租金/車位": 14400, "電話分期": 450, "水電煤": 1500,
    "保險": 3400, "旅遊": 4000, "買樓儲蓄": 12000
};

let currentBudgets = {...initialBudgets};
let historyData = {};

function showStatus(text, duration = 0) {
    const status = document.getElementById('sync-status');
    status.innerText = text;
    status.style.display = 'block';
    if (duration > 0) {
        setTimeout(() => { status.style.display = 'none'; }, duration);
    }
}

function hideStatus() {
    document.getElementById('sync-status').style.display = 'none';
}

async function syncFromCloud() {
    showStatus('☁️ 讀取雲端數據...');
    try {
        // 在網址後加入 ?t=時間戳，防止瀏覽器讀取舊快取
        const response = await fetch(API_URL + '?t=' + new Date().getTime());
        const rows = await response.json(); 
        
        let newBudgets = {...initialBudgets};
        let newHistory = {};
        
        // 從第二行開始讀取 (跳過標題列)
        for (let i = 1; i < rows.length; i++) {
            if(!rows[i][1]) continue; 
            
            let d = new Date(rows[i][0]);
            let time = (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours() + ':' + d.getMinutes().toString().padStart(2, '0');
            let cat = rows[i][1];
            let amt = parseFloat(rows[i][2]);
            let rem = rows[i][3] || "";
            
            if (newBudgets[cat] !== undefined) {
                newBudgets[cat] -= amt;
                if (!newHistory[cat]) newHistory[cat] = [];
                newHistory[cat].push({ amt, rem, time, row: i + 1 });
            }
        }
        currentBudgets = newBudgets;
        historyData = newHistory;
        render(); // 先渲染畫面
        showStatus('✅ 同步成功', 1000);
    } catch (e) {
        console.error(e);
        showStatus('⚠️ 讀取失敗: ' + e.message, 3000);
    }
}

function render() {
    const container = document.getElementById('budget-container');
    container.innerHTML = '';
    let total = 0;
    
    for (let item in currentBudgets) {
        total += currentBudgets[item];
        const logs = historyData[item] || [];
        let logList = logs.slice(-5).reverse().map(l => `
            <div class="history-row">
                <div class="history-info"><b>${l.rem}</b> <span style="font-size:10px;color:#999">${l.time}</span></div>
                <div class="history-amt">-$${l.amt}</div>
                <div class="del-x" onclick="deleteRecord('${l.row}', '${item}')">×</div>
            </div>
        `).join('');

        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
            <div class="card-top"><h3>${item}</h3><div class="balance">$${currentBudgets[item].toLocaleString()}</div></div>
            <div class="input-row">
                <input type="number" id="amt-${item}" placeholder="金額" inputmode="decimal">
                <input type="text" id="rem-${item}" placeholder="備註">
            </div>
            <button class="main-btn" onclick="deduct('${item}')">確認扣數</button>
            <div class="history-box">${logList || '<span style="color:#ccc;font-size:12px;padding:5px">暫無紀錄</span>'}</div>
        `;
        container.appendChild(div);
    }
    document.getElementById('total-left').innerText = `剩餘總額: $${total.toLocaleString()}`;
}

async function deduct(cat) {
    const amtField = document.getElementById(`amt-${cat}`);
    const remField = document.getElementById(`rem-${cat}`);
    const amt = parseFloat(amtField.value);
    const rem = remField.value || "無備註";
    
    if (isNaN(amt) || amt <= 0) return;

    showStatus('📤 正在上傳紀錄...');
    
    try {
        await fetch(API_URL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify({ action: 'add', cat, amt, rem }) 
        });
        amtField.value = '';
        remField.value = '';
        // 為了讓用戶感覺更快，先手動同步一次或直接重新抓取
        await syncFromCloud(); 
    } catch (e) { 
        alert('上傳失敗，請檢查網路'); 
        hideStatus();
    }
}

async function deleteRecord(row, cat) {
    if(!confirm('確定刪除呢條紀錄？')) return;
    showStatus('🗑️ 正在刪除...');
    try {
        await fetch(API_URL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify({ action: 'delete_row', row: row }) 
        });
        await syncFromCloud();
    } catch (e) { 
        alert('刪除失敗'); 
        hideStatus();
    }
}

// 初始加載
syncFromCloud();
</script>
</body>
</html>
