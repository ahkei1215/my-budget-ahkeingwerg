<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>6月財富管理</title>
    <style>
        :root { --primary: #3498db; --danger: #e74c3c; --dark: #2c3e50; --success: #27ae60; --muted: #7f8c8d; }
        
        /* 確保寬度 100% 並優化移動端體驗 */
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #f0f2f5; 
            padding: 10px; 
            margin: 0; 
            width: 100%;
            overflow-x: hidden;
        }

        .header { 
            background: var(--dark); 
            color: white; 
            padding: 20px 15px; 
            border-radius: 12px; 
            margin-bottom: 12px; 
            text-align: center; 
            width: 100%;
        }

        .grid { 
            display: grid; 
            grid-template-columns: 1fr; /* 移動端預設一欄，寬度會自動 100% */
            gap: 12px; 
            width: 100%;
        }

        .card { 
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); 
            width: 100%;
        }

        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .card-title { margin: 0; font-size: 18px; }
        .card-right { text-align: right; }
        .balance { font-size: 22px; font-weight: bold; color: var(--success); }
        /* 當超支變負數時的樣式 */
        .balance.negative { color: var(--danger); }
        .total-spent { font-size: 12px; color: var(--muted); margin-top: 2px; }
        
        .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
        input { 
            flex: 1; 
            padding: 10px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 16px; /* 防止 iOS 輸入時自動放大 */
            width: 100%;
        }

        button.main-btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            width: 100%; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px;
            transition: background 0.3s;
        }
        button.main-btn:active { background: #2980b9; }

        /* 歷史紀錄區域 */
        .history-box { 
            margin-top: 12px; 
            background: #f9f9f9; 
            border-radius: 8px; 
            padding: 8px; 
            max-height: 150px; 
            overflow-y: auto; 
            border: 1px solid #eee;
        }
        .history-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 8px 4px; 
            border-bottom: 1px solid #eee; 
            font-size: 13px; 
        }
        .history-row:last-child { border-bottom: none; }
        .history-amt { color: var(--danger); font-weight: bold; margin: 0 10px; }
        .del-x { color: #ccc; cursor: pointer; font-weight: bold; font-size: 18px; padding: 0 8px; }

        /* 修改後的「同步中」彈窗 */
        #sync-status { 
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: rgba(0, 0, 0, 0.8); 
            color: white; 
            padding: 20px 40px; 
            border-radius: 50px; 
            z-index: 9999; 
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0">6月預算</h2>
    <div id="total-left" style="font-size:16px; margin-top:8px; font-weight:bold; color: #ecf0f1;">計算中...</div>
</div>

<div id="sync-status">☁️ 雲端同步中...</div>

<div class="grid" id="budget-container"></div>

<script>
// 請確保 API_URL 正確
const API_URL = 'https://script.google.com/macros/s/AKfycbzOV0Km_t68RnmCWD7YXSFt8l6I1PGHlB2plKFmu4APWcB0lR0yhBcegDlZ_YRzNtGn/exec'; 

const initialBudgets = {
    "午餐": 2640, "晚餐": 3120, "零用": 6690, "交通/養車": 4100,
    "租金/車位": 14400, "電話分期": 450, "水電煤": 1500,
    "保險": 3400, "旅遊": 4000, "買樓儲蓄": 12000
};

let currentBudgets = {...initialBudgets};
let historyData = {};

function showStatus(text, duration = 0) {
    const status = document.getElementById('sync-status');
    status.innerText = text;
    status.style.display = 'block';
    if (duration > 0) {
        setTimeout(() => { status.style.display = 'none'; }, duration);
    }
}

function hideStatus() {
    document.getElementById('sync-status').style.display = 'none';
}

async function syncFromCloud() {
    showStatus('☁️ 讀取雲端數據...');
    try {
        const response = await fetch(API_URL + '?t=' + new Date().getTime());
        const rows = await response.json(); 
        
        console.log("從雲端讀取到的原始資料：", rows);

        let newBudgets = {...initialBudgets};
        let newHistory = {};
        
        for (let i = 0; i < rows.length; i++) {
            if(!rows[i] || rows[i].length < 2) continue; 
            
            let rowDate = rows[i][0];
            let cat = rows[i][1];      
            let amt = parseFloat(rows[i][2]); 
            let rem = rows[i][3] || "";      

            if (isNaN(amt) && rows[i][3]) {
                amt = parseFloat(rows[i][3]);
                rem = rows[i][4] || "";
            }

            let d = new Date(rowDate);
            let time = (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours() + ':' + d.getMinutes().toString().padStart(2, '0');
            
            if (newBudgets[cat] !== undefined && !isNaN(amt)) {
                newBudgets[cat] -= amt;
                if (!newHistory[cat]) newHistory[cat] = [];
                newHistory[cat].push({ amt, rem, time, row: i + 1 });
            }
        }
        currentBudgets = newBudgets;
        historyData = newHistory;
        render(); 
        showStatus('✅ 同步成功', 1000);
    } catch (e) {
        console.error("讀取失敗原因：", e);
        showStatus('⚠️ 讀取失敗', 3000);
    }
}

function render() {
    const container = document.getElementById('budget-container');
    container.innerHTML = '';
    
    let totalLeft = 0;
    let unclassifiedSpent = 0; // 用嚟計算打錯字、認唔到類別嘅總支出
    let unclassifiedLogs = []; // 儲存認唔到類別嘅紀錄

    // 1. 先計算所有預算內項目
    for (let item in currentBudgets) {
        totalLeft += currentBudgets[item];
        const logs = historyData[item] || [];
        let totalSpent = logs.reduce((sum, log) => sum + log.amt, 0);

        let logList = logs.slice(-5).reverse().map(l => `
            <div class="history-row">
                <div class="history-info"><b>${l.rem}</b> <span style="font-size:10px;color:#999">${l.time}</span></div>
                <div class="history-amt">-$${l.amt.toFixed(2)}</div>
                <div class="del-x" onclick="deleteRecord('${l.row}', '${item}')">×</div>
            </div>
        `).join('');

        const isNegative = currentBudgets[item] < 0;
        const balanceClass = isNegative ? 'balance negative' : 'balance';

        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
            <div class="card-top">
                <h3 class="card-title">${item}</h3>
                <div class="card-right">
                    <div class="${balanceClass}">$${currentBudgets[item].toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                    <div class="total-spent">本月已用: $${totalSpent.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                </div>
            </div>
            <div class="input-row">
                <input type="number" id="amt-${item}" placeholder="金額" inputmode="decimal">
                <input type="text" id="rem-${item}" placeholder="備註">
            </div>
            <button class="main-btn" onclick="deduct('${item}')">確認扣數</button>
            <div class="history-box">${logList || '<span style="color:#ccc;font-size:12px;padding:5px">暫無紀錄</span>'}</div>
        `;
        container.appendChild(div);
    }

    // 2. 檢查是否有「打錯字/未分類」嘅隱形支出（去 historyData 搵返 initialBudgets 冇嘅 key）
    for (let cat in historyData) {
        if (initialBudgets[cat] === undefined) {
            const errorLogs = historyData[cat] || [];
            errorLogs.forEach(l => {
                unclassifiedSpent += l.amt;
                unclassifiedLogs.push(`【${cat}】-${l.amt.toFixed(2)} (${l.rem})`);
            });
        }
    }

    // 真正的淨剩餘：要再減埋呢啲冇被歸類卡片扣減嘅隱形支出
    totalLeft -= unclassifiedSpent;

    // 3. 如果真係有未分類開支，喺最頂部生一個紅色警告卡片提示你
    if (unclassifiedLogs.length > 0) {
        const errorDiv = document.createElement('div');
        errorDiv.className = 'card';
        errorDiv.style.border = '2px solid var(--danger)';
        errorDiv.style.background = '#fdf2f2';
        errorDiv.innerHTML = `
            <div class="card-top" style="margin-bottom: 5px;">
                <h3 class="card-title" style="color: var(--danger)">⚠️ 發現未分類/打錯字支出</h3>
                <div class="balance negative">-$${unclassifiedSpent.toFixed(2)}</div>
            </div>
            <p style="font-size: 12px; color: #666; margin: 0 0 8px 0;">以下項目喺網頁冇對應卡片（請去 Google Sheet 修改類別名稱，確保冇多填空格）：</p>
            <div style="font-size: 13px; color: var(--dark); background: #fff; padding: 8px; border-radius: 6px; border: 1px solid #f5c6cb;">
                ${unclassifiedLogs.join('<br>')}
            </div>
        `;
        // 將警告卡片塞到最前面
        container.insertBefore(errorDiv, container.firstChild);
    }
    
    // 更新頂部「真正的淨剩餘」總額（強制顯示兩位小數）
    document.getElementById('total-left').innerText = `真正的淨剩餘: $${totalLeft.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
}

async function deduct(cat) {
    const amtField = document.getElementById(`amt-${cat}`);
    const remField = document.getElementById(`rem-${cat}`);
    const amt = parseFloat(amtField.value);
    const rem = remField.value || "無備註";
    
    if (isNaN(amt) || amt <= 0) return;

    const originalBudget = currentBudgets[cat];
    const originalHistory = historyData[cat] || [];
    
    currentBudgets[cat] -= amt;
    if (!historyData[cat]) historyData[cat] = [];
    historyData[cat].push({ 
        amt, 
        rem, 
        time: "同步中...", 
        row: "pending" 
    });
    
    render(); // 立即樂觀更新介面
    amtField.value = '';
    remField.value = '';

    showStatus('📤 雲端同步中...');
    
    try {
        await fetch(API_URL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify({ action: 'add', cat, amt, rem }) 
        });

        setTimeout(async () => {
            await syncFromCloud(); 
        }, 1500);

    } catch (e) { 
        currentBudgets[cat] = originalBudget;
        historyData[cat] = originalHistory;
        render();
        alert('同步失敗，請檢查網路！資料已還原'); 
        hideStatus();
    }
}

async function deleteRecord(row, cat) {
    if(!confirm('確定刪除呢條紀錄？')) return;
    showStatus('🗑️ 正在刪除...');
    try {
        await fetch(API_URL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify({ action: 'delete_row', row: row }) 
        });
        await syncFromCloud();
    } catch (e) { 
        alert('刪除失敗'); 
        hideStatus();
    }
}

// 初始加載
syncFromCloud();
</script>
</body>
</html>
