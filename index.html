<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3月預算雲端同步版</title>
    <style>
        :root { --primary: #3498db; --danger: #e74c3c; --dark: #2c3e50; }
        body { font-family: sans-serif; background: #f0f2f5; padding: 15px; margin: 0; padding-bottom: 50px; }
        .header { background: var(--dark); color: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .card h3 { margin: 0; font-size: 16px; color: #34495e; }
        .balance { font-size: 20px; font-weight: bold; color: var(--dark); }
        .input-row { display: flex; gap: 8px; margin-bottom: 8px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; width: 40%; }
        button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        #sync-status { display: none; text-align: center; color: #f39c12; margin-bottom: 10px; font-weight: bold; font-size: 14px; background: #fff; padding: 5px; border-radius: 8px; }
        .history { margin-top: 10px; font-size: 12px; border-top: 1px solid #eee; padding-top: 5px; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0">3月預算儀表板 (雲端同步)</h2>
    <p id="total-left" style="font-size:14px; margin-top:5px; opacity:0.9">載入中...</p>
</div>

<div id="sync-status">☁️ 準備連線...</div>

<div class="grid" id="budget-container"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzOV0Km_t68RnmCWD7YXSFt8l6I1PGHlB2plKFmu4APWcB0lR0yhBcegDlZ_YRzNtGn/exec'; 

const initialBudgets = {
    "午餐": 2640, "晚餐": 3120, "零用": 6690, "交通/養車": 4100,
    "租金/車位": 14400, "電話分期": 450, "水電煤": 1500,
    "保險": 3400, "旅遊": 4000, "買樓儲蓄": 12000
};

let currentBudgets = JSON.parse(localStorage.getItem('march_Budgets')) || {...initialBudgets};
let historyData = JSON.parse(localStorage.getItem('march_History')) || {};

async function syncFromCloud() {
    const status = document.getElementById('sync-status');
    status.style.display = 'block';
    status.innerText = '☁️ 正在連線雲端數據...';

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 8000); // 寬限到 8 秒

    try {
        const response = await fetch(API_URL, { signal: controller.signal });
        const rows = await response.json(); 
        clearTimeout(timeoutId);

        let newBudgets = {...initialBudgets};
        let newHistory = {};

        for (let i = 1; i < rows.length; i++) {
            if(!rows[i][1]) continue; 
            let dateObj = new Date(rows[i][0]);
            let time = (dateObj.getMonth()+1) + '/' + dateObj.getDate() + ' ' + dateObj.getHours() + ':' + dateObj.getMinutes().toString().padStart(2, '0');
            let cat = rows[i][1];
            let amt = parseFloat(rows[i][2]);
            let rem = rows[i][3] || "無備註";

            if (newBudgets[cat] !== undefined) {
                newBudgets[cat] -= amt;
                if (!newHistory[cat]) newHistory[cat] = [];
                newHistory[cat].push({ amt, rem, time });
            }
        }

        currentBudgets = newBudgets;
        historyData = newHistory;
        status.innerText = '✅ 雲端同步成功';
        setTimeout(() => { status.style.display = 'none'; }, 2000);
    } catch (e) {
        console.error("同步失敗:", e);
        status.innerText = '⚠️ 連線失敗，正使用本地紀錄';
    }
    render();
}

function render() {
    const container = document.getElementById('budget-container');
    if (!container) return;
    container.innerHTML = '';
    let total = 0;
    
    for (let item in currentBudgets) {
        total += currentBudgets[item];
        const logs = historyData[item] || [];
        const div = document.createElement('div');
        div.className = 'card';
        
        let histHTML = logs.slice(-2).reverse().map(l => 
            `<div style="display:flex;justify-content:space-between;font-size:11px;color:#888;margin-top:4px;">
                <span>${l.time} ${l.rem}</span><span>-$${l.amt}</span>
            </div>`).join('');
        
        div.innerHTML = `
            <div class="card-top"><h3>${item}</h3><div class="balance">$${currentBudgets[item].toLocaleString()}</div></div>
            <div class="input-row">
                <input type="number" id="amt-${item}" placeholder="金額" inputmode="decimal">
                <input type="text" id="rem-${item}" placeholder="備註">
            </div>
            <button onclick="deduct('${item}')">確認扣數</button>
            <div class="history">${histHTML || '<span style="color:#ccc">暫無紀錄</span>'}</div>
        `;
        container.appendChild(div);
    }
    document.getElementById('total-left').innerText = `剩餘總額: $${total.toLocaleString()}`;
    
    localStorage.setItem('march_Budgets', JSON.stringify(currentBudgets));
    localStorage.setItem('march_History', JSON.stringify(historyData));
}

async function deduct(cat) {
    const amtInput = document.getElementById(`amt-${cat}`);
    const remInput = document.getElementById(`rem-${cat}`);
    const amt = parseFloat(amtInput.value);
    const rem = remInput.value || "無備註";

    if (!isNaN(amt) && amt > 0) {
        const status = document.getElementById('sync-status');
        status.style.display = 'block';
        status.innerText = '📤 正在上傳...';

        currentBudgets[cat] -= amt;
        let d = new Date();
        let time = (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours() + ':' + d.getMinutes().toString().padStart(2, '0');
        
        if (!historyData[cat]) historyData[cat] = [];
        historyData[cat].push({ amt, rem, time: time });
        render();

        try {
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ cat, amt, rem })
            });
            status.innerText = '✅ 已存至雲端';
            setTimeout(() => { status.style.display = 'none'; }, 2000);
        } catch (e) {
            status.innerText = '❌ 上傳失敗 (已存於本地)';
        }

        amtInput.value = '';
        remInput.value = '';
    }
}

render(); 
syncFromCloud();
</script>

</body>
</html>
