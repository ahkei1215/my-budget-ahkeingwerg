<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3月預算同步版</title>
    <style>
        :root { --primary: #3498db; --danger: #e74c3c; --dark: #2c3e50; }
        body { font-family: sans-serif; background: #f0f2f5; padding: 15px; margin: 0; padding-bottom: 50px; }
        .header { background: var(--dark); color: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .card h3 { margin: 0; font-size: 16px; color: #34495e; }
        .balance { font-size: 20px; font-weight: bold; color: var(--dark); }
        .input-row { display: flex; gap: 8px; margin-bottom: 8px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; }
        .history { margin-top: 10px; font-size: 12px; border-top: 1px solid #eee; padding-top: 5px; }
        .history-row { display: flex; justify-content: space-between; padding: 3px 0; color: #666; }
        .btn-del { color: #ccc; border: none; background: none; margin-left: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0">3月預算儀表板 (雲端同步)</h2>
    <p id="total-left" style="font-size:14px; margin-top:5px; opacity:0.9">剩餘總額: $52,300</p>
</div>

<div id="loading" style="display:none; text-align:center; color:orange; margin-bottom:10px;">☁️ 同步中...</div>
<div class="grid" id="budget-container"></div>

<script>
// 1. 🚀 填入妳的 Google Script URL
const API_URL = 'https://script.google.com/macros/s/AKfycbxauaxw2Q8k-0E77ZXj2fzGlDdJPJNsXBionq2G71yyEW_3SspWYs7TVhzC89riQhps/exec'; 

// 2. 初始金額設定 (跟足妳張 Excel)
const initialBudgets = {
    "午餐": 2640, "晚餐": 3120, "零用": 6690, "交通/養車": 4100,
    "租金/車位": 14400, "電話分期": 450, "水電煤": 1500,
    "保險": 3400, "旅遊": 4000, "買樓儲蓄": 12000
};

let currentBudgets = {...initialBudgets};
let historyData = {};

// 3. 核心功能：從 Google Sheets 攞返所有紀錄嚟同步
async function syncFromCloud() {
    const status = document.getElementById('sync-status');
    status.style.display = 'block';
    status.innerText = '☁️ 正在同步雲端數據...';

    try {
        // 向 Google Sheet 攞數 (執行 doGet)
        const response = await fetch(API_URL);
        const rows = await response.json(); 

        // 重新根據 Sheet 紀錄計一次餘額 (Single Source of Truth)
        let newBudgets = {...initialBudgets};
        let newHistory = {};

        // 由第 2 行開始讀 (第 1 行係 Header)
        for (let i = 1; i < rows.length; i++) {
            let time = new Date(rows[i][0]).toLocaleString('zh-HK', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'});
            let cat = rows[i][1];
            let amt = parseFloat(rows[i][2]);
            let rem = rows[i][3] || "無備註";

            if (newBudgets[cat] !== undefined) {
                newBudgets[cat] -= amt;
                if (!newHistory[cat]) newHistory[cat] = [];
                newHistory[cat].push({ amt, rem, time });
            }
        }

        currentBudgets = newBudgets;
        historyData = newHistory;
        render();
        status.innerText = '✅ 雲端同步完成';
        setTimeout(() => status.style.display = 'none', 2000);

    } catch (e) {
        console.error(e);
        status.innerText = '❌ 同步失敗，正使用本地快照';
        // 如果斷網，就用返 LocalStorage 頂住先
        currentBudgets = JSON.parse(localStorage.getItem('march_Budgets')) || {...initialBudgets};
        historyData = JSON.parse(localStorage.getItem('march_History')) || {};
        render();
    }
}

function render() {
    const container = document.getElementById('budget-container');
    container.innerHTML = '';
    let total = 0;
    
    for (let item in currentBudgets) {
        total += currentBudgets[item];
        const logs = historyData[item] || [];
        const div = document.createElement('div');
        div.className = 'card';
        
        // 顯示最近 2 條紀錄
        let histHTML = logs.slice(-2).reverse().map(l => 
            `<div style="display:flex;justify-content:space-between;font-size:11px;color:#888;margin-top:4px;">
                <span>${l.time} ${l.rem}</span><span>-$${l.amt}</span>
            </div>`).join('');
        
        div.innerHTML = `
            <div class="card-top"><h3>${item}</h3><div class="balance">$${currentBudgets[item].toLocaleString()}</div></div>
            <div class="input-row">
                <input type="number" id="amt-${item}" placeholder="金額" inputmode="decimal">
                <input type="text" id="rem-${item}" placeholder="備註">
            </div>
            <button onclick="deduct('${item}')">確認扣數</button>
            <div class="history">${histHTML || '<span style="color:#ccc">暫無紀錄</span>'}</div>
        `;
        container.appendChild(div);
    }
    document.getElementById('total-left').innerText = `剩餘總額: $${total.toLocaleString()}`;
    
    // 儲存一份快照落手機，以防斷網
    localStorage.setItem('march_Budgets', JSON.stringify(currentBudgets));
    localStorage.setItem('march_History', JSON.stringify(historyData));
}

async function deduct(cat) {
    const amtInput = document.getElementById(`amt-${cat}`);
    const remInput = document.getElementById(`rem-${cat}`);
    const amt = parseFloat(amtInput.value);
    const rem = remInput.value || "無備註";

    if (!isNaN(amt) && amt > 0) {
        const status = document.getElementById('sync-status');
        status.style.display = 'block';
        status.innerText = '📤 正在上傳數據...';

        // 先更新畫面 (Optimistic UI)
        currentBudgets[cat] -= amt;
        const now = new Date().toLocaleString('zh-HK', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'});
        if (!historyData[cat]) historyData[cat] = [];
        historyData[cat].push({ amt, rem, time: now });
        render();

        try {
            // 傳去 Google Sheet
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ cat, amt, rem })
            });
            status.innerText = '✅ 已同步至雲端';
            setTimeout(() => status.style.display = 'none', 2000);
        } catch (e) {
            status.innerText = '❌ 上傳失敗，請稍後重試';
        }

        amtInput.value = '';
        remInput.value = '';
    }
}

// 啟動：一開網頁即同步
syncFromCloud();

</script>
</body>
</html>
